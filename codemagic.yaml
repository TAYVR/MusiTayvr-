workflows:
  ios-build:
    name: MusiTayvr iOS Build
    instance_type: mac_mini_m1
    environment:
      vars:
        APP_ID: com.musitayvr.musitayvr
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          cp -R "build/ios/iphoneos/Runner.app" Payload/
          zip -r MusiTayvr.ipa Payload/
          mkdir -p build/ios/ipa
          mv MusiTayvr.ipa build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - you@example.com
