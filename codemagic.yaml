workflows:
  ios-build:
    name: MusiTayvr iOS Build
    instance_type: mac_mini_m1
    environment:
      vars:
        APP_ID: com.musitayvr.musitayvr
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          echo "=== Build structure ==="
          find build/ios -name "*.app" -type d
          echo "=== Creating IPA ==="
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r MusiTayvr.ipa Payload/
          mkdir -p build/ios/ipa
          mv MusiTayvr.ipa build/ios/ipa/
          echo "=== IPA created ==="
          ls -la build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa
